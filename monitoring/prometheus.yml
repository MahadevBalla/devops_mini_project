global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'money-mentor-backend'
    static_configs:
      - targets: ['mm-backend:8000']
    metrics_path: '/metrics'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['mm-node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['mm-cadvisor:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
